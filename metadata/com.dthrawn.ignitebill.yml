Summary: A simple and efficient billing timer for freelancers.
Description: |-
  IgniteBill helps freelancers and professionals track their work sessions in real-time
  to generate accurate billing. Features include background timing, local notifications,
  and PDF invoice generation.

  Key Features:
  * Real-time work session tracking
  * Background service support
  * Home screen widget for quick access
  * PDF report and invoice generation
  * 100% Free and Open Source

