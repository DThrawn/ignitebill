Builds:
  - versionName: 1.2.2
    versionCode: 171
    commit: v1.2.2
    subdir: android/app
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scanignore:
      - .flutter/bin/cache
    scandelete:
      - .flutter
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --flavor foss --split-per-abi --target-platform="android-arm"
    output: build/app/outputs/flutter-apk/app-foss-armeabi-v7a-release.apk

