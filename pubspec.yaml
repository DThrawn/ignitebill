name: ignite_bill
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.5+8
homepage: https://github.com/DThrawn/ignitebill
repository: https://github.com/DThrawn/ignitebill
issue_tracker: https://github.com/DThrawn/ignitebill/issues

environment:
  sdk: '>=3.3.4 <4.0.0'
  flutter: '>=3.20.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  share_plus: ^9.0.0
  path_provider: ^2.1.4
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.0
  home_widget: ^0.9.3
  pdf: 3.11.1
  printing: ^5.11.1
  file_picker: ^8.0.0

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
