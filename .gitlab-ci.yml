image: "ghcr.io/cirruslabs/flutter:stable"

variables:
  JAVA_VERSION: "21"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - .pub-cache/
    - build/

before_script:
  - export PATH="$PATH:$HOME/.pub-cache/bin"
  - flutter doctor
  - flutter pub get

build_foss_release:
  stage: build
  script:
    - flutter build apk --flavor foss --release
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-foss-release.apk
