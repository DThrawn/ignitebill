image: "ghcr.io/cirruslabs/flutter:stable"

variables:
  JAVA_VERSION: "21"
  KOTLIN_VERSION: "2.2.20"
  ANDROID_USER_HOME: "${CI_PROJECT_DIR}/.android"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs='-Xmx2048m'"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - .pub-cache/
    - build/

before_script:
  - export PATH="$PATH:$HOME/.pub-cache/bin"
  - mkdir -p $ANDROID_USER_HOME
  - |
    if [ -n "$KEYSTORE_BASE64" ]; then
      echo "Configuring Keystore for GitLab CI..."
      echo "$KEYSTORE_BASE64" | base64 -d > android/ignitech.jks
      echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
      echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
      echo "keyAlias=$KEY_ALIAS" >> android/key.properties
      echo "storeFile=ignitech.jks" >> android/key.properties
    else
      echo "No keystore variables found, build will be unsigned."
    fi
  - flutter doctor -v
  - flutter pub get

build_foss_release:
  stage: build
  script:
    - |
      echo "Checking if APK already exists..."
      APK_PATH=$(find . -name "*foss-release.apk" | head -n 1)
      if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
        echo "APK already found at $APK_PATH, skipping build."
        cp "$APK_PATH" ignitebill-foss-release.apk
        exit 0
      fi
    - flutter pub get
    - cd android
    - chmod +x gradlew
    - ./gradlew assembleFossRelease --no-daemon
    - cd ..
    - |
      echo "Locating generated APK in standard Gradle output..."
      # Target the standard Gradle output path for the 'foss' flavor release
      APK_PATH=$(find android/app/build/outputs/apk/foss/release/ -name "*.apk" | head -n 1)
      if [ -z "$APK_PATH" ]; then
        echo "Not found in standard path, searching everywhere..."
        APK_PATH=$(find . -name "*foss-release.apk" | head -n 1)
      fi
      
      if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
        echo "Found APK at: $APK_PATH"
        cp "$APK_PATH" ignitebill-foss-release.apk
      else
        echo "ERROR: APK not produced by Gradle build."
        echo "Project structure for diagnostics:"
        find . -maxdepth 5 -not -path '*/.*'
        exit 1
      fi
  artifacts:
    paths:
      - ignitebill-foss-release.apk
    expire_in: 1 week
