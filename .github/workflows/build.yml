name: Build Flutter APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx6G -Dorg.gradle.configuration-cache=false"
      ANDROID_PREFS_ROOT: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs
        run: |
          flutter clean
          flutter pub get
          # We use || true as a fallback because flutter build apk sometimes returns 1 if it fails to find the APK in the root build folder, 
          # but we will manually verify and upload from the android/ folder.
          flutter build apk --debug --split-per-abi --no-pub || echo "Flutter build returned non-zero, checking android folder..."
          flutter build apk --release --split-per-abi --no-pub || echo "Flutter build returned non-zero, checking android folder..."
          
          # Verify that APKs were actually built
          if [ ! -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "Release APK not found in android folder!"
            # exit 1 # Uncomment if you want to fail if release apk is missing
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            build/app/outputs/flutter-apk/app-*-debug.apk
            android/app/build/outputs/apk/debug/app-*-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/app-*-release.apk
            android/app/build/outputs/apk/release/app-*-release.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-*-release.apk
            android/app/build/outputs/apk/release/app-*-release.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
