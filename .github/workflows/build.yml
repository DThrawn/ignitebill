name: Flutter CI/CD - Build & Release

# Déclencheurs du workflow
on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ] # Déclenche la release sur les tags de version
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # Job 1 : Qualité du code et tests
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Compatible Node 24

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Analyze
        # --no-fatal-infos et --no-fatal-warnings pour ne pas bloquer sur des lints mineurs
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter Test
        run: flutter test

  # Job 2 : Build de l'APK et Release GitHub
  build:
    name: Build & Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nécessaire pour créer des releases GitHub
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Étape CRUCIALE : Configuration de la signature de l'APK
      - name: Configure Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/ignitech.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=ignitech.jks" >> android/key.properties

      - name: Build APK Release
        run: flutter build apk --release

      - name: Prepare Release Assets
        id: prepare_assets
        run: |
          mkdir -p release_files
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          
          # Copie de l'APK principal
          cp $APK_PATH release_files/ignitebill-release.apk
          
          # Création des archives ZIP et TAR contenant uniquement l'APK
          cd release_files
          zip ignitebill-release.zip ignitebill-release.apk
          tar -czf ignitebill-release.tar.gz ignitebill-release.apk
          cd ..
          
          echo "Assets prêts dans le dossier release_files/ :"
          ls -R release_files/

      # Upload des artefacts pour conservation dans GitHub Actions (optionnel mais utile)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ignitebill-apks
          path: release_files/

      # Publication de la Release GitHub (uniquement sur les tags v*)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_files/ignitebill-release.apk
            release_files/ignitebill-release.zip
            release_files/ignitebill-release.tar.gz
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
