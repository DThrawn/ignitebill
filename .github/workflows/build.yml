name: Flutter CI/CD - Build & Release

# Déclenchement à CHAQUE push sur main ou master
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_release:
    name: Build & Release (Rolling)
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour modifier les releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-v3' # Force total reset
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

      - name: Flutter Test
        run: flutter test

      - name: Configure Keystore (Optional)
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/ignitech.jks
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=ignitech.jks" >> android/key.properties
          else
            echo "No keystore secret found, building unsigned APK."
          fi

      - name: Build APK Release (FOSS)
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android
        run: |
          mkdir -p $ANDROID_USER_HOME
          flutter clean
          flutter pub get
          # The build is successful if at least one APK is produced, regardless of Flutter's return code
          # Flutter tool often exits with 1 when multiple APKs (splits) are produced.
          flutter build apk --flavor foss --release --verbose || find android/app/build/outputs/apk/foss/release/ -name "*.apk" | grep -q .

      - name: Locate APK
        id: locate_apk
        run: |
          # Collect all generated APKs (Universal + Splits)
          APKS=$(find android/app/build/outputs/apk/foss/release/ -name "*.apk" -not -name "*-unsigned.apk")
          if [ -z "$APKS" ]; then
            echo "Error: APK not found even after manual search."
            ls -R android/app/build/outputs/apk/ || true
            exit 1
          fi
          
          # Join paths with newlines for action-gh-release
          {
            echo "paths<<EOF"
            echo "$APKS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Found APKs:"
          echo "$APKS"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_apk.outputs.paths }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Rolling Release (Auto-build)' }}
          body: |
            ${{ github.ref_type == 'tag' && format('Release officielle {0}', github.ref_name) || format('Build automatique généré le {0}.', github.event.head_commit.timestamp) }}
            Version : ${{ github.sha }}
            Flavor : FOSS
          prerelease: ${{ github.ref_type != 'tag' }}
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
