name: Build Flutter APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx6G -Dorg.gradle.configuration-cache=false"
      # Unify Android environment variables to avoid AndroidLocationsBuildService conflicts
      ANDROID_USER_HOME: "/home/runner/.android"
      ANDROID_SDK_HOME: "/home/runner/.android"
      ANDROID_PREFS_ROOT: "/home/runner/.android"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;28.2.13676358'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs
        run: |
          mkdir -p $ANDROID_USER_HOME
          flutter clean
          flutter pub get
          
          echo "Building Debug APKs..."
          flutter build apk --debug --split-per-abi --no-pub
          
          echo "Building Release APKs..."
          flutter build apk --release --split-per-abi --no-pub
          
          echo "Listing all generated APKs for debugging:"
          find . -name "*.apk"

      - name: Prepare Release Assets
        run: |
          mkdir -p release_apks
          # Recursively find all APKs and copy them with unique names to avoid collisions
          # We prefix with the parent folder name (e.g. debug_app-debug.apk)
          find . -name "*.apk" -not -path "*/.pub-cache/*" -not -path "*/.dart_tool/*" | while read -r apk; do
            filename=$(basename "$apk")
            parent=$(basename $(dirname "$apk"))
            cp "$apk" "release_apks/${parent}_${filename}"
          done
          
          ls -l release_apks/
          
          if [ $(ls release_apks/*.apk | wc -l) -eq 0 ]; then
            echo "Error: No APKs were found after build!"
            exit 1
          fi

      - name: Upload APKs to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: release_apks/*.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: release_apks/*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "Automated build and release from GitHub Actions (Build #${{ github.run_number }})"
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
