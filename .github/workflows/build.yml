name: Build Flutter APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy local.properties
        run: |
          echo "flutter.sdk=${{ steps.flutter-action.outputs.flutter-path }}" > android/local.properties

      - name: Build Debug APK
        run: flutter build apk --debug --verbose

      - name: Build Release APK
        run: flutter build apk --release --no-shrink --verbose

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
