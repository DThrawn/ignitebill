name: Build Flutter APKs

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

      - name: Flutter Test
        run: flutter test

  build:
    name: Build & Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build APKs
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Collect Assets
        id: collect
        run: |
          mkdir -p release_assets
          echo "Searching for APKs..."
          
          # 1. Collect all release APKs regardless of sub-path
          find build/app/outputs/flutter-apk/ -name "*.apk" -not -name "*-debug.apk" -not -name "*-profile.apk" | while read -r apk; do
            filename=$(basename "$apk")
            if [[ "$filename" == "app-release.apk" ]]; then
              cp "$apk" "release_assets/ignitebill-universal-release.apk"
            else
              # Rename to be more descriptive if needed, or keep original
              cp "$apk" "release_assets/$filename"
            fi
          done
          
          # 2. Verify we found something
          count=$(ls release_assets/*.apk 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No release APKs found! Build might have failed or paths changed."
            exit 1
          fi
          echo "Found $count APKs."

          # 3. Generate SHA256 Checksums (Security standard)
          echo "Generating checksums..."
          cd release_assets
          sha256sum *.apk > ../SHA256SUMS.txt
          cd ..
          cp SHA256SUMS.txt release_assets/
          
          # 4. Create archives
          echo "Creating ZIP and TAR archives..."
          zip -j ignitebill_apks.zip release_assets/*.apk SHA256SUMS.txt
          tar -cvzf ignitebill_apks.tar.gz -C release_assets .
          
          echo "Final assets list:"
          ls -R release_assets/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-build-assets
          path: |
            release_assets/
            ignitebill_apks.zip
            ignitebill_apks.tar.gz

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GH CLI to create a robust release
          # --clobber allows overwriting if the tag was moved/re-pushed
          gh release create ${{ github.ref_name }} \
            release_assets/*.apk \
            ignitebill_apks.zip \
            ignitebill_apks.tar.gz \
            SHA256SUMS.txt \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --target ${{ github.sha }} \
            --verify-tag
