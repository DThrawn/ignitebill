name: Build Flutter APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx6G -Dorg.gradle.configuration-cache=false"
      ANDROID_USER_HOME: "/home/runner/.android"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;28.2.13676358'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub upgrade

      - name: Build APKs
        run: |
          mkdir -p $ANDROID_USER_HOME
          flutter clean
          
          echo "Building Debug APKs..."
          flutter build apk --debug --split-per-abi --no-pub
          
          echo "Building Release APKs..."
          flutter build apk --release --split-per-abi --no-pub
          
          echo "Listing all files for debugging (recursive find):"
          find . -name "*.apk"

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          echo "Collecting APKs..."
          
          # Collect all APKs and organize them
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec cp {} release_assets/ \;
          
          echo "Creating ZIP archive..."
          cd release_assets && zip -r ../ignitebill_apks.zip ./*.apk && cd ..
          
          echo "Creating TAR archive..."
          cd release_assets && tar -cvzf ../ignitebill_apks.tar.gz ./*.apk && cd ..
          
          echo "Final assets ready:"
          ls -lh release_assets/*.apk ignitebill_apks.zip ignitebill_apks.tar.gz
          
          count=$(ls release_assets/*.apk 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "CRITICAL ERROR: No APKs were found after build!"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-build-assets
          path: |
            release_assets/*.apk
            ignitebill_apks.zip
            ignitebill_apks.tar.gz

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/*.apk
            ignitebill_apks.zip
            ignitebill_apks.tar.gz
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          name: Release Build #${{ github.run_number }}
          body: |
            Automated build and release.
            
            **Contenu de la release :**
            - APKs individuelles (Debug & Release, par architecture)
            - `ignitebill_apks.zip` : Archive contenant toutes les APKs
            - `ignitebill_apks.tar.gz` : Archive compressée contenant toutes les APKs
            
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
