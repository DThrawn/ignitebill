name: Build Flutter APKs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx6G -Dorg.gradle.configuration-cache=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;28.2.13676358'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs
        run: |
          # Sanitize environment to avoid AndroidLocationsBuildService conflicts
          unset ANDROID_PREFS_ROOT
          unset ANDROID_SDK_HOME
          export ANDROID_USER_HOME="$HOME/.android"
          
          flutter clean
          flutter pub get
          
          echo "Building Debug APKs..."
          flutter build apk --debug --split-per-abi --no-pub || echo "Flutter build returned non-zero (often path mismatch), proceeding to check files..."
          
          echo "Building Release APKs..."
          flutter build apk --release --split-per-abi --no-pub || echo "Flutter build returned non-zero (often path mismatch), proceeding to check files..."
          
          echo "Discovery of generated APKs:"
          find . -name "*.apk"

      - name: Prepare Release Assets
        run: |
          mkdir -p release_apks
          find . -name "*.apk" -exec cp {} release_apks/ \;
          ls -l release_apks/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: release_apks/*.apk

      - name: Create Release

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: release_apks/*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
