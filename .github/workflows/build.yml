name: Build Flutter APKs # Triggering manual refresh

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4G -Dorg.gradle.configuration-cache=false"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Verify Node.js version
        run: node -v

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --verbose --split-per-abi

      - name: Build Release APK
        run: flutter build apk --release --verbose --split-per-abi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release*.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v3
        with:
          files: build/app/outputs/flutter-apk/app-release*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
