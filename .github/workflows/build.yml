name: Flutter CI/CD - Build & Release

# Déclenchement à CHAQUE push sur main ou master
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_and_release:
    name: Build & Release (Rolling)
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour modifier les releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-v3' # Force total reset
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

      - name: Flutter Test
        run: flutter test

      - name: Configure Keystore (Optional)
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/ignitech.jks
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=ignitech.jks" >> android/key.properties
          else
            echo "No keystore secret found, building unsigned APK."
          fi

      - name: Build APK Release (FOSS)
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android
        run: |
          mkdir -p $ANDROID_USER_HOME
          flutter clean
          flutter pub get
          # On ne considère le build réussi que si l'APK est présent, même si Flutter signale une erreur de localisation
          flutter build apk --flavor foss --release --verbose || [ -f android/app/build/outputs/apk/foss/release/app-foss-release.apk ]

      - name: Locate APK
        id: locate_apk
        run: |
          # Recherche exhaustive dans le dossier build de l'app android
          # On cherche d'abord la version signée, puis n'importe quel APK foss release
          APK_PATH=$(find android/app/build/outputs/apk/foss/release/ -name "app-foss-release.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "app-foss-release*.apk" | head -n 1)
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found even after manual search."
            ls -R build/app/outputs/ || true
            ls -R android/app/build/outputs/apk/ || true
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_apk.outputs.path }}
          tag_name: latest
          name: "Latest Rolling Release (Auto-build)"
          body: |
            Build automatique généré le ${{ github.event.head_commit.timestamp }}.
            Version : ${{ github.sha }}
            Flavor : FOSS
          prerelease: true
          allowUpdates: true # Écrase l'ancien APK par le nouveau
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
